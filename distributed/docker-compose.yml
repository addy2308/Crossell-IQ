services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: crosssell
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  prediction-service:
    build: ./prediction_service
    ports:
      - "8001:8001"
    environment:
      - REDIS_URL=redis://redis:6379/0
      - MODEL_DIR=/app/models
      - MLFLOW_ALLOW_FILE_STORE=true
    volumes:
      - ../models:/app/models
      - ../data:/app/data
    depends_on:
      redis:
        condition: service_healthy

  api-gateway:
    volumes:
      - ../data:/app/data
      - ./api_gateway/static:/app/static
    build: ./api_gateway
    ports:
      - "8000:8000"
    environment:
      - PREDICTION_SERVICE_URL=http://prediction-service:8001
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - prediction-service

  worker:
    build: ./worker
    environment:
      - REDIS_URL=redis://redis:6379/0
    volumes:
      - ../models:/app/models
      - ../data:/app/data
    depends_on:
      redis:
        condition: service_healthy

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - api-gateway

volumes:
  postgres_data:
