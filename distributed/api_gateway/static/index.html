<!DOCTYPE html>
<html>
<head><title>CrossSell IQ – Test</title></head>
<body style="background:#060b14; color:#fff; font-family:sans-serif; padding:2rem;">
  <div id="login-box" style="max-width:400px; margin:0 auto;">
    <h2>Sign In</h2>
    <input type="email" id="email" placeholder="admin@crosselliq.com" style="width:100%;padding:0.5rem;margin:0.5rem 0;background:#0a1220;border:1px solid #3b82f6;color:#fff;">
    <input type="password" id="password" placeholder="admin123" style="width:100%;padding:0.5rem;margin:0.5rem 0;background:#0a1220;border:1px solid #3b82f6;color:#fff;">
    <button onclick="login()" style="padding:0.5rem 1rem;background:#3b82f6;color:#fff;border:none;">Login</button>
    <button onclick="register()" style="padding:0.5rem 1rem;background:#1e40af;color:#fff;border:none;margin-left:1rem;">Register</button>
    <p id="auth-error" style="color:red;"></p>
  </div>
  <div id="dashboard" style="display:none; max-width:800px; margin:0 auto;">
    <h2>Dashboard Data</h2>
    <pre id="data" style="background:#0a1220;padding:1rem;border-radius:0.5rem;overflow:auto;max-height:80vh;"></pre>
  </div>
  <script>
    const API = '/api/v1';
    let token = localStorage.getItem('access_token') || '';

    async function login() {
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const res = await fetch(API + '/auth/login', {
        method: 'POST', headers: {'Content-Type':'application/json'},
        body: JSON.stringify({email, password})
      });
      if (!res.ok) { document.getElementById('auth-error').textContent = 'Login failed'; return; }
      const data = await res.json();
      token = data.access_token;
      localStorage.setItem('access_token', token);
      showDashboard();
    }

    async function register() {
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const res = await fetch(API + '/auth/register', {
        method: 'POST', headers: {'Content-Type':'application/json'},
        body: JSON.stringify({name:'Test', email, password, role:'agent'})
      });
      if (!res.ok) { document.getElementById('auth-error').textContent = 'Registration failed'; return; }
      const data = await res.json();
      token = data.access_token;
      localStorage.setItem('access_token', token);
      showDashboard();
    }

    async function showDashboard() {
      document.getElementById('login-box').style.display = 'none';
      document.getElementById('dashboard').style.display = 'block';
      const res = await fetch(API + '/dashboard/summary', {
        headers: {'Authorization': 'Bearer ' + token}
      });
      const data = await res.json();
      document.getElementById('data').textContent = JSON.stringify(data, null, 2);
    }

    if (token) { showDashboard(); }
  </script>
</body>
</html>
