global:
  resolve_timeout: 5m
  # Email settings
  smtp_smarthost: 'smtp.gmail.com:587'
  smtp_auth_username: 'your-email@gmail.com'
  smtp_auth_password: 'your-app-password'
  smtp_from: 'netflix-alerts@gmail.com'

# The root route with all parameters
route:
  receiver: 'default'
  group_by: ['alertname', 'cluster', 'service']
  group_wait: 10s
  group_interval: 10s
  repeat_interval: 12h

  # Nested routes for different components
  routes:
    # Critical alerts
    - match:
        severity: critical
      receiver: 'critical'
      continue: true
      group_wait: 0s
      group_interval: 1m
      repeat_interval: 4h
      
    # API alerts
    - match:
        component: api
      receiver: 'api-team'
      group_interval: 5m
      
    # Model alerts
    - match:
        component: model
      receiver: 'ml-team'
      group_interval: 5m
      
    # Database alerts
    - match:
        component: database
      receiver: 'dba-team'
      group_interval: 5m
      
    # SLA alerts
    - match:
        component: sla
      receiver: 'critical'
      group_wait: 0s
      repeat_interval: 1h

# Inhibition rules
inhibit_rules:
  # Inhibit warning if critical exists
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['alertname', 'component']
  
  # Inhibit low severity if warning exists
  - source_match:
      severity: 'warning'
    target_match:
      severity: 'info'
    equal: ['alertname', 'component']

# Receivers/notification channels
receivers:
  - name: 'default'
    # Default receiver - can add email, webhook, etc.

  - name: 'critical'
    email_configs:
      - to: 'ops-critical@company.com'
        from: 'netflix-alerts@gmail.com'
        smarthost: 'smtp.gmail.com:587'
        auth_username: 'netflix-alerts@gmail.com'
        auth_password: 'your-app-password'
        headers:
          Subject: '[CRITICAL] {{ .GroupLabels.alertname }}'
        html: |
          <h2>Critical Alert Triggered</h2>
          <p><strong>Alert:</strong> {{ .GroupLabels.alertname }}</p>
          <p><strong>Component:</strong> {{ .GroupLabels.component }}</p>
          <p><strong>Severity:</strong> {{ .GroupLabels.severity }}</p>
          <ul>
          {{ range .Alerts }}
            <li>{{ .Annotations.summary }}: {{ .Annotations.description }}</li>
          {{ end }}
          </ul>
          <p><a href="http://grafana.company.com/d/netflix-api">View Dashboard</a></p>

  - name: 'api-team'
    email_configs:
      - to: 'api-team@company.com'
        smarthost: 'smtp.gmail.com:587'
        auth_username: 'netflix-alerts@gmail.com'
        auth_password: 'your-app-password'
        headers:
          Subject: '[API Alert] {{ .GroupLabels.alertname }}'
    slack_configs:
      - api_url: 'https://hooks.slack.com/services/YOUR/WEBHOOK/URL'
        channel: '#netflix-api-alerts'
        title: 'API Alert: {{ .GroupLabels.alertname }}'
        text: '{{ range .Alerts }}{{ .Annotations.description }}{{ end }}'

  - name: 'ml-team'
    email_configs:
      - to: 'ml-team@company.com'
        smarthost: 'smtp.gmail.com:587'
        auth_username: 'netflix-alerts@gmail.com'
        auth_password: 'your-app-password'
        headers:
          Subject: '[ML Model Alert] {{ .GroupLabels.alertname }}'

  - name: 'dba-team'
    email_configs:
      - to: 'dba-team@company.com'
        smarthost: 'smtp.gmail.com:587'
        auth_username: 'netflix-alerts@gmail.com'
        auth_password: 'your-app-password'
        headers:
          Subject: '[Database Alert] {{ .GroupLabels.alertname }}'

  - name: 'webhook'
    webhook_configs:
      - url: 'http://localhost:5001/api/alerts'
        send_resolved: true
