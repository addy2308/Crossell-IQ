# Prometheus Configuration for Netflix Cross-Sell API Monitoring
# Scrapes metrics from FastAPI application and system metrics

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'netflix-cross-sell-monitor'
    environment: 'production'

# Alertmanager configuration
alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - localhost:9093

# Load rules files
rule_files:
  - '/etc/prometheus/rules/alerts.yml'

scrape_configs:
  # FastAPI Backend Application
  - job_name: 'netflix-backend'
    static_configs:
      - targets: ['localhost:8000']
    metrics_path: '/metrics'
    scrape_interval: 10s
    scrape_timeout: 5s
    
  # PostgreSQL Database
  - job_name: 'postgresql'
    static_configs:
      - targets: ['localhost:5432']
    metrics_path: '/metrics'
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'postgres'
    
  # Redis Cache
  - job_name: 'redis'
    static_configs:
      - targets: ['localhost:6379']
    
  # Node Exporter (System Metrics)
  - job_name: 'node'
    static_configs:
      - targets: ['localhost:9100']
    
  # Prometheus Self-Monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
    
  # Docker Metrics
  - job_name: 'docker'
    static_configs:
      - targets: ['localhost:9323']
