name: CrossSell IQ CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: crosssell_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          cd backend
          pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Run tests with coverage
        run: |
          cd backend
          pytest tests/ -v --tb=short --cov=app --cov-report=term-missing --cov-report=xml
      
      - name: Upload coverage
        uses: codecov/codecov-action@v3
        with:
          file: ./backend/coverage.xml
          flags: unittests
      
      - name: Lint with flake8
        run: |
          pip install flake8
          cd backend
          flake8 app/ --count --max-complexity=10 --statistics || true

  build:
    needs: test
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Build Docker image
        run: |
          docker build -t crosssell-iq:latest ./backend
      
      - name: Test Docker image
        run: |
          docker run -d -p 8000:8000 --name crosssell-test crosssell-iq:latest
          sleep 5
          curl -f http://localhost:8000/health || exit 1
          docker stop crosssell-test
      
      - name: Security scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: crosssell-iq:latest
          format: table
          exit-code: 0
          severity: HIGH,CRITICAL
          - name: Security scan
  run: |
    pip install safety
    safety check
    

  performance:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - name: Run k6 load test
        uses: grafana/k6-action@v0.3.1
        with:
          path: tests/loadtest.js
          flags: --vus 10 --duration 30s
