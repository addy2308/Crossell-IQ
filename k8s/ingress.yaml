apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: crosssell-ingress
  namespace: crosssell-iq
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - api.crosselliq.com
    secretName: crosssell-tls
  rules:
  - host: api.crosselliq.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: crosssell-api
            port:
              number: 8000
