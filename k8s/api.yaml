apiVersion: apps/v1
kind: Deployment
metadata:
  name: crosssell-api
  namespace: crosssell-iq
  labels:
    app: crosssell-api
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: crosssell-api
  template:
    metadata:
      labels:
        app: crosssell-api
    spec:
      containers:
      - name: api
        image: crosssell-iq:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8000
          name: http
        envFrom:
        - configMapRef:
            name: crosssell-config
        - secretRef:
            name: crosssell-secrets
        resources:
          requests:
            memory: "512Mi"
            cpu: "500m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 15
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: crosssell-api
  namespace: crosssell-iq
spec:
  selector:
    app: crosssell-api
  ports:
  - port: 8000
    targetPort: 8000
  type: ClusterIP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: crosssell-api-hpa
  namespace: crosssell-iq
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: crosssell-api
  minReplicas: 3
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
